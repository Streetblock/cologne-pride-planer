<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cologne Pride Planer">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Cologne Pride Planer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-800 antialiased font-sans flex flex-col h-screen">

    <!-- Header & Search (Sticky) -->
    <header class="sticky top-0 z-40 bg-white shadow-md">
        <div class="rainbow-bg h-2 w-full"></div>
        <div class="p-4 flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold font-sans tracking-tight">Cologne Pride Planer</h1>
                <span class="text-xs font-semibold bg-gray-100 text-gray-600 px-2 py-1 rounded-full" id="counter">Lädt...</span>
            </div>
            
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="searchInput" 
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors" 
                    placeholder="Suchen nach Name oder Nummer...">
            </div>

            <!-- Filter Tabs -->
            <div class="flex gap-2 mt-1">
                <button id="btnAll" class="filter-btn flex-1 py-2 text-sm font-medium rounded-lg bg-indigo-100 text-indigo-700 transition-colors">Alle</button>
                <button id="btnFav" class="filter-btn flex-1 py-2 text-sm font-medium rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Favoriten</button>
            </div>

            <div class="grid grid-cols-[1fr_auto_auto] gap-2 items-center">
                <select id="locationSelect" class="min-w-0 rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-semibold text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"></select>
                <button id="btnAddLocation" class="rounded-lg bg-indigo-50 px-3 py-2 text-sm font-bold text-indigo-700 hover:bg-indigo-100 transition-colors">Neu</button>
                <button id="btnDataActions" class="rounded-lg bg-gray-100 px-3 py-2 text-sm font-bold text-gray-700 hover:bg-gray-200 transition-colors">Daten</button>
            </div>

            <div id="dataPanel" class="hidden grid grid-cols-2 gap-2 rounded-lg border border-gray-200 bg-gray-50 p-2">
                <button id="btnExportState" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-100">Export</button>
                <button id="btnImportData" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-100">Import</button>
                <button id="btnInstallApp" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-indigo-700 shadow-sm hover:bg-indigo-50">Installieren</button>
                <button id="btnResetCurrent" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-red-700 shadow-sm hover:bg-red-50">Ort leeren</button>
                <button id="btnResetTimes" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-red-700 shadow-sm hover:bg-red-50">Zeiten resetten</button>
                <button id="btnResetFavorites" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-red-700 shadow-sm hover:bg-red-50">Favoriten resetten</button>
                <button id="btnResetGroups" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-red-700 shadow-sm hover:bg-red-50">Gruppen resetten</button>
                <input id="importFileInput" class="hidden" type="file" accept="application/json,.json">
            </div>
        </div>

        <!-- Prognose Banner -->
        <div id="trackingBanner" class="bg-gray-50 text-gray-600 text-xs px-4 py-2 border-b border-gray-200 shadow-inner flex items-center justify-between transition-colors">
            <span id="trackingText">📍 Markiere Gruppen mit "Jetzt da!", um ETAs zu berechnen.</span>
            <button id="btnResetTrack" class="hidden text-gray-400 hover:text-red-500 font-bold ml-2 p-1 focus:outline-none" title="Markierungen zurücksetzen">✕</button>
        </div>
    </header>

    <!-- List Container -->
    <main class="flex-1 overflow-x-hidden p-4 pb-20">
        <div id="paradeList" class="flex flex-col gap-3 max-w-2xl mx-auto">
            <!-- Cards werden hier per JS eingefügt -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-10">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">Keine Gruppen gefunden</h3>
            <p class="mt-1 text-sm text-gray-500">Versuche einen anderen Suchbegriff.</p>
        </div>
    </main>

    <div id="confirmModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-950/50 p-4">
        <div class="w-full max-w-sm rounded-lg bg-white p-4 shadow-xl">
            <h2 id="confirmTitle" class="text-base font-bold text-gray-900">Bestätigen</h2>
            <p id="confirmMessage" class="mt-2 text-sm text-gray-600"></p>
            <div class="mt-4 flex justify-end gap-2">
                <button id="confirmCancel" class="rounded-lg bg-gray-100 px-3 py-2 text-sm font-bold text-gray-700 hover:bg-gray-200">Abbrechen</button>
                <button id="confirmAccept" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-bold text-white hover:bg-red-700">Bestätigen</button>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
